  unrs-resolver: true
  vue-demi: true
catalog:
  '@antfu/eslint-config': ^9.0.0
  '@changesets/cli': ^2.31.0
  '@chatondearu/eslint-config': ^0.3.1
  '@nazka/map-gl-js-spiderfy': ^2.0.0
  '@types/node': 22.19.19
  '@vitejs/plugin-vue': ^5.0.3
  '@vitest/coverage-v8': ^2.1.9
  '@vue/tsconfig': ^0.5.1
  '@vueuse/core': ^14.3.0
  eslint: ^9.39.4
  eslint-plugin-format: ^2.0.1
  jsdom: ^24.1.3
  maplibre-gl: ^5.24.0
  maplibregl-mapbox-request-transformer: ^0.0.3
  mkdist: ^1.4.0
  typescript: ^5.3.3
  unbuild: 2.0.0
  vite: ^5.0.12
  vitepress: ^1.6.4
  vitest: ^2.1.9
  vue: ^3.5.35
  vue-tsc: ^3.3.3
minimumReleaseAgeExclude:
